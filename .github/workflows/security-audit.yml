name: security-audit

on:
  push:
  pull_request:
  schedule:
    # Weekly belt-and-braces run so a sleeping repo still surfaces drift in
    # the supply-chain test surface.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  security-audit:
    name: capability + supply-chain test surface
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-secaudit-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-secaudit-${{ runner.os }}-

      # Each gate runs as its own step so a failure surfaces with the correct
      # red status check rather than being buried in a combined log.
      - name: Unsafe surface report (must be empty)
        run: cargo test -p ori-compiler --test unsafe_surface_report -- --nocapture

      - name: Capability runtime denial enforced
        run: cargo test -p ori-compiler --test capability_runtime_denial -- --nocapture

      - name: Capability bypass attempt rejected
        run: cargo test -p ori-pkg --test capability_bypass -- --nocapture

      - name: Lockfile tamper detection
        run: cargo test -p ori-pkg --test lockfile_tamper -- --nocapture

      - name: SBOM schema conformance
        run: cargo test -p ori-pkg --test sbom_schema -- --nocapture

      - name: Provenance failure path enforced
        run: cargo test -p ori-pkg --test provenance_failure -- --nocapture
