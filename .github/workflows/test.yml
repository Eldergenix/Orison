name: test

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  static:
    name: static gate prerequisite
    uses: ./.github/workflows/static.yml

  test:
    name: cargo test (${{ matrix.os }} / ${{ matrix.toolchain }})
    needs: static
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        toolchain:
          - stable
          - nightly
        experimental:
          - false
        include:
          # Nightly is informational-only on every OS; a toolchain regression
          # in upstream rustc must never block main.
          - os: ubuntu-latest
            toolchain: nightly
            experimental: true
          - os: macos-latest
            toolchain: nightly
            experimental: true
          - os: windows-latest
            toolchain: nightly
            experimental: true
        exclude:
          # The include block above re-introduces these with experimental=true;
          # drop the non-experimental duplicates so each combo only runs once.
          - os: ubuntu-latest
            toolchain: nightly
            experimental: false
          - os: macos-latest
            toolchain: nightly
            experimental: false
          - os: windows-latest
            toolchain: nightly
            experimental: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ runner.os }}-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.toolchain }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema

      - name: Cargo format check
        run: cargo fmt --all --check

      - name: Cargo clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test (workspace)
        run: cargo test --workspace

      - name: Full validation gate
        run: python3 scripts/validate_all.py --full
