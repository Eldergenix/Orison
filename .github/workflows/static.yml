name: static

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  static-gate:
    name: static gate (no Rust toolchain)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema

      - name: Run static gate
        run: python3 scripts/validate_all.py --static-only
